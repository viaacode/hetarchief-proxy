query getOrganisationBySlug($slug: String!) {
	graph_organization(where: { organizationSlug: { slug: { _eq: $slug } } }) {
		id
		org_identifier
		skos_pref_label
		dcterms_description
		foaf_homepage
		ha_org_has_logo
		ha_org_request_form
		ha_org_sector
		updated_at
		created_at
		schema_vat_id
		organizationSlug {
			slug
		}
		hasSite {
			postalAddress {
				schema_street_address
				schema_address_locality
				schema_postal_code
			}
		}
		schemaContactPoint {
			schema_contact_type
			schema_email
			schema_telephone
		}
	}
}
