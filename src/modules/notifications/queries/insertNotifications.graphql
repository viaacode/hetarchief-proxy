mutation insertNotifications($objects: [app_notification_insert_input!]!) {
	insert_app_notification(objects: $objects) {
		returning {
			id
			description
			title
			status
			type
			recipient
			linked_entity_id
			created_at
			updated_at
			visitor_space_request {
				cp_space_id
				visitor_space {
					id
					schema_maintainer_id
					organisation {
						organizationSlug {
							slug
						}
					}
				}
			}
			material_request {
				requested_by {
					first_name
					last_name
				}
				intellectualEntity {
					schemaMaintainer {
						skos_pref_label
					}
				}
			}
		}
	}
}
