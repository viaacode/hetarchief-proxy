query getThemeWithObjectsInRandomOrder($themeId: uuid!, $objectsLimit: Int!) {
	app_theme_by_pk(id: $themeId) {
		id
		slug
		name_nl
		name_en
		description_nl
		description_en
		image_url
		content_page_path_nl
		content_page_path_en
		ieObjectLinksRandomOrder(limit: $objectsLimit) {
			ieObject {
				id
				schema_name
				dctermsFormat {
					dcterms_format
				}
				schemaThumbnail {
					schema_thumbnail_url
				}
				schemaMaintainer {
					id
					skos_pref_label
				}
			}
		}
	}
}
