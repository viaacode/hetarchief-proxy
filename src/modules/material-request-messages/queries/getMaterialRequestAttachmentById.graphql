query getMaterialRequestAttachmentById($materialRequestId: uuid!, $attachmentId: uuid!) {
	app_material_request_messages_attachments(
		where: {
			id: { _eq: $attachmentId }
			messages_and_event: { material_request_id: { _eq: $materialRequestId } }
		}
		limit: 1
	) {
		id
		attachment_url
		attachment_filename
		created_at
	}
}
