query getMaterialRequestAttachments(
	$materialRequestId: uuid!
	$offset: Int!
	$limit: Int!
	$orderBy: [app_material_request_messages_attachments_order_by!] = [{ created_at: asc }]
) {
	app_material_request_messages_attachments(
		where: { messages_and_event: { material_request_id: { _eq: $materialRequestId } } }
		offset: $offset
		limit: $limit
		order_by: $orderBy
	) {
		id
		attachment_url
		attachment_filename
		created_at
	}

	app_material_request_messages_attachments_aggregate(
		where: { messages_and_event: { material_request_id: { _eq: $materialRequestId } } }
	) {
		aggregate {
			count
		}
	}
}
