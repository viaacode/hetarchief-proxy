query findMaterialRequestsWithUnresolvedAdditionalConditions($reminderDate: timestamp!) {
	app_material_requests_with_pending_additional_conditions(
		where: {
			messages_and_events: {
				message_type: { _eq: ADDITIONAL_CONDITIONS }
				created_at: { _lt: $reminderDate }
			}
		}
	) {
		id
		ie_object_id
		profile_id
		reason
		type
		created_at
		updated_at
		requested_at
		is_pending
		is_archived
		status
		group_id
		name
		download_status
		download_available_at
		requester_capacity
		organisation
		organisation_sector
		requested_by {
			id
			full_name
			first_name
			last_name
			mail
			language
			group {
				name
				label
				description
				id
			}
		}
		intellectualEntity {
			schema_identifier
			schema_name
			id
			schema_date_published
			created_at
			premisIdentifier(limit: 1) {
				value
			}
			dctermsFormat(limit: 1) {
				dcterms_format
			}
			schemaThumbnail {
				schema_thumbnail_url
			}
			schemaMaintainer {
				org_identifier
				skos_pref_label
				ha_org_has_logo
				skos_alt_label
				ha_org_sector
				schemaContactPoint {
					schema_contact_type
					schema_email
					schema_telephone
				}
				visitorSpace {
					slug
				}
			}
			schemaLicenses {
				schema_license
			}
		}
		ie_object_representation_id
		objectRepresentation {
			id
			schema_name
			is_media_fragment_of
			schema_in_language
			schema_start_time
			schema_end_time
			schema_transcript
			schemaTranscriptUrls {
				schema_transcript
				schema_transcript_url
			}
			edm_is_next_in_sequence
			updated_at
			includes {
				file {
					id
					schema_name
					ebucore_has_mime_type
					premis_stored_at
					schema_thumbnail_url
					schema_duration
					edm_is_next_in_sequence
					created_at
				}
			}
		}
		material_request_reuse_form_values {
			key
			value
		}
	}
}
