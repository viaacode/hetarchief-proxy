query findMaterialRequestsStatusById($id: uuid!) {
	app_material_requests(where: { id: { _eq: $id } }) {
		id
		updated_at
		messages_and_events(
			where: { message_type: { _nin: [MESSAGE] } }
			order_by: { created_at: asc }
		) {
			id
			created_at
			message_type
			body
		}
		status
		download_status
	}
}
